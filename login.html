<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - My Personal Website</title>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                    <span class="field-error" id="email-error" role="alert"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                    <span class="field-error" id="password-error" role="alert"></span>
                </div>

                <div class="form-message" id="form-message" role="alert"></div>

                <button type="submit" id="submit-btn" class="login-btn">Sign In</button>
            </form>

            <div class="login-footer">
                <a href="index.html">&larr; Back to Portfolio</a>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
